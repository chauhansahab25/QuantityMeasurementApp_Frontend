<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Authentication - Quantity Measurement</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #1a1a3e 0%, #0f0f1a 60%, #1a0a2e 100%);
      color: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .callback-container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 400px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #4285f4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #ff6b6b;
      background: rgba(255,107,107,0.1);
      padding: 12px;
      border-radius: 8px;
      margin: 20px 0;
      border: 1px solid rgba(255,107,107,0.3);
    }
    .success {
      color: #51cf66;
      background: rgba(81,207,102,0.1);
      padding: 12px;
      border-radius: 8px;
      margin: 20px 0;
      border: 1px solid rgba(81,207,102,0.3);
    }
  </style>
</head>
<body>
  <div class="callback-container">
    <h2>🔷 Google Authentication</h2>
    <div id="status">
      <div class="spinner"></div>
      <p>Completing authentication...</p>
    </div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script>
    async function handleCallback() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error');
      const statusEl = document.getElementById('status');

      if (error) {
        statusEl.innerHTML = `
          <div class="error">
            <strong>Authentication Failed</strong><br>
            ${error}
          </div>
          <p><a href="index.html">← Back to Login</a></p>
        `;
        return;
      }

      if (!code) {
        statusEl.innerHTML = `
          <div class="error">
            <strong>Missing Authorization Code</strong><br>
            No authorization code received from Google.
          </div>
          <p><a href="index.html">← Back to Login</a></p>
        `;
        return;
      }

      try {
        const data = await api.handleGoogleCallback(code);
        
        // Store authentication data
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('mode', 'authenticated');
        
        statusEl.innerHTML = `
          <div class="success">
            <strong>Authentication Successful!</strong><br>
            Welcome ${data.user.firstName} ${data.user.lastName}
          </div>
          <p>Redirecting to dashboard...</p>
        `;
        
        // Redirect to dashboard after a short delay
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
        
      } catch (err) {
        statusEl.innerHTML = `
          <div class="error">
            <strong>Authentication Failed</strong><br>
            ${err.message}
          </div>
          <p><a href="index.html">← Back to Login</a></p>
        `;
      }
    }

    // Handle callback when page loads
    document.addEventListener('DOMContentLoaded', handleCallback);
  </script>
</body>
</html>
