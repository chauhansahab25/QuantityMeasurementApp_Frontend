<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History — Quantity Measurement</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/history.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <span class="header-icon">📐</span>
      <span class="header-title">Quantity Measurement</span>
    </div>
    <div class="header-right">
      <a href="dashboard.html" class="btn btn-ghost btn-sm">⬅ Dashboard</a>
      <span id="user-info" class="user-badge"></span>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- Guest notice -->
  <div id="guest-notice" class="guest-banner" style="display:none">
    <span>👤 History is only available for logged-in users. <a href="index.html">Login</a> to view your history.</span>
  </div>

  <!-- Main -->
  <main id="history-main" class="history-main">

    <div class="history-header">
      <div>
        <h2 class="history-title">📋 Operation History</h2>
        <span id="total-count" class="total-count"></span>
      </div>
      <button class="btn btn-outline btn-sm danger-btn" onclick="clearHistory()">🗑 Clear All</button>
    </div>

    <div id="history-error" class="alert"></div>

    <!-- Filters -->
    <div class="filters card">
      <div class="filter-row">
        <div class="form-group">
          <label>Filter by Operation</label>
          <select id="filter-op">
            <option value="">All Operations</option>
            <option value="CONVERT">🔄 Convert</option>
            <option value="COMPARE">⚖️ Compare</option>
            <option value="ADD">➕ Add</option>
            <option value="SUBTRACT">➖ Subtract</option>
            <option value="DIVIDE">➗ Divide</option>
          </select>
        </div>
        <div class="form-group">
          <label>Filter by Type</label>
          <select id="filter-type">
            <option value="">All Types</option>
            <option value="LengthUnit">📏 Length</option>
            <option value="VolumeUnit">🧪 Volume</option>
            <option value="WeightUnit">⚖️ Weight</option>
            <option value="TemperatureUnit">🌡️ Temperature</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn btn-primary btn-sm" onclick="applyFilters()">Apply</button>
          <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Reset</button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrapper card">
      <table class="history-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Operation</th>
            <th>Type</th>
            <th>Input</th>
            <th>Result</th>
            <th>Date &amp; Time</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr><td colspan="7" class="empty-row">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="pagination"></div>

  </main>

  <script src="js/api.js?v=3"></script>
  <script src="js/history.js?v=3"></script>
  <script>
    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
